project_doc_fallback_filenames = ["codex.md"]
developer_instructions = """
LuaEduca operating mode:
- Read CONTEXT.md, MEMORY.md, AGENTS.md, and codex.md before non-trivial work.
- Ground every material claim in filesystem state, live command output, MCP output, or official vendor docs.
- Prefer deterministic prompts, minimal diffs, explicit file paths, and explicit verification.
- Use Gemini or project-bridge for planning; use Codex for implementation and verification.
"""
